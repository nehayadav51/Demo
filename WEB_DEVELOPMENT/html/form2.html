<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Job Application Form</h1>

    <label for="xy">Username :</label>
    <input type="text" id="xy" placeholder="Enter Name">
    <br>
    <br>
    <label for="yx">Email :</label>
    <input type="text" id="yx" placeholder="Enter Email ID">
    <br>
    <br>
    <label for="x">Phone Number :</label>
    <input type="tel" id="x" placeholder="Enter Phone Number">
    <br>
    <br>
    <label for="counter">Experience (in years) :</label>
    <input type="number" id="counter" min="0" max="50">
    <br>
    <br>
    <label for="dob">DOB</label>
    <input type="date" id="dob">
    <br>
    <br>
    <label for="fileUpload">Resume :</label>
    <input type="file" id="fileUpload">
    <br>
    <br>
    <label for="a">Occupation :</label>
    <select id="a">
        <option value="student">Student</option>
        <option value="professional">Professional</option>
        <option value="other">Other</option>
    </select>
    <br>
    <br>
    <fieldset>
        <legend>Skills :</legend>

        <label for="n">HTML</label>
        <input type="checkbox" id="n">
        <label for="u">CSS</label>
        <input type="checkbox" id="u">
        <label for="t">JavaScript</label>
        <input type="checkbox" id="t">
    </fieldset>
    <br>
    <br>
    <!-- Drop down -->
    <label for="education">Highest Education :</label>
    <select id="education">
        <option value="High School">High School</option>
        <option value="Bachelor's Degree">Bachelor's Degree</option>
        <option value="Master's Degree">Master's Degree</option>
        <option value="Associate's Degree">Associate's Degree</option>
        <option value="Phd">Phd</option>
    </select>
    <br>
    <br>
    <!-- Radio Buttons -->
     <fieldset>
        <legend>Availability</legend>
            <label for="ft">Full-Time</label>
            <input type="radio" name="fulltime"id=ft>
            <br>
            <label for="pt">Part-Time</label>
            <input type="radio" name="fulltime"id=pt>
        
     </fieldset>
    <br>
    <br>
    <label for="z">Comments :</label>
    <textarea id="z"></textarea>
    <br>
    <br>
    <input type="submit" value="Submit Application">
</body>
</html>
